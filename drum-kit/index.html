<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drum Kit</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>🎧 Drum Kit</h1>

    <div class="keys">
        <div class="key" data-key="65">A<span class="sound-name">Clap</span></div>
        <div class="key" data-key="83">S<span class="sound-name">Hi-Hat</span></div>
        <div class="key" data-key="68">D<span class="sound-name">Kick</span></div>
        <div class="key" data-key="70">F<span class="sound-name">Open-Hat</span></div>
        <div class="key" data-key="71">G<span class="sound-name">Boom</span></div>
        <div class="key" data-key="72">H<span class="sound-name">Ride</span></div>
        <div class="key" data-key="74">J<span class="sound-name">Snare</span></div>
        <div class="key" data-key="75">K<span class="sound-name">Tom</span></div>
        <div class="key" data-key="76">L<span class="sound-name">Tink</span></div>
    </div>


    <!-- Audio Elements -->
    <audio data-key="65" src="sounds/clap.wav"></audio>
    <audio data-key="83" src="sounds/hihat.wav"></audio>
    <audio data-key="68" src="sounds/kick.wav"></audio>
    <audio data-key="70" src="sounds/openhat.wav"></audio>
    <audio data-key="71" src="sounds/boom.wav"></audio>
    <audio data-key="72" src="sounds/ride.wav"></audio>
    <audio data-key="74" src="sounds/snare.wav"></audio>
    <audio data-key="75" src="sounds/tom.wav"></audio>
    <audio data-key="76" src="sounds/tink.wav"></audio>

    <script src="script.js"></script>
</body>

</html>
